apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tito-pizzeria-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Rodriguez-22/backend-mc-pnpm-local-main.git'
    targetRevision: main
    path: deploy/kubernetes/tito-pizzeria
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: tito-pizzeria
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true