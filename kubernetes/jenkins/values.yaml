# kubernetes/jenkins/values.yaml
jenkins:
  controller:
    componentName: "jenkins-controller"
    image:
      tag: "2.541.1"
    imagePullPolicy: "Always"
    runAsUser: 1000
    fsGroup: 1000
    adminUser: "admin"
    adminPassword: "admin"
    serviceType: "ClusterIP"
    ingress:
      enabled: true
      ingressClassName: "nginx"
      # NUEVO HOST: Usando la nueva IP del VPS
      hostName: "jenkins.194.163.158.235.nip.io"
      annotations:
        kubernetes.io/ingress.class: nginx
        nginx.ingress.kubernetes.io/ssl-redirect: "false"
    installPlugins:
      - kubernetes
      - workflow-aggregator
      - git
      - github
      - credentials-binding
      - configuration-as-code
      - dark-theme
    sidecars:
      configAutoReload:
        enabled: false
  persistence:
    enabled: true
    existingClaim: "jenkins-pvc"
    storageClass: "microk8s-hostpath"
  serviceAccount:
    create: true
    name: "jenkins"